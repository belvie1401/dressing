databases:
  - name: mon-dressing-db
    plan: free
    databaseName: mon_dressing
    user: mondressing

services:
  - type: web
    name: mon-dressing-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run db:push && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mon-dressing-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://lucent-melba-a4edb5.netlify.app
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
