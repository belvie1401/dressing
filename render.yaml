services:
  - type: web
    name: mon-dressing-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build && npm run db:push
    startCommand: npm start
    envVars:
      # Neon pooled URL (PgBouncer) — set in dashboard
      - key: DATABASE_URL
        sync: false
      # Neon direct URL (for Prisma CLI / migrations) — set in dashboard
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://lucent-melba-a4edb5.netlify.app
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # Cloudinary (photo upload + background removal) — set in dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Anthropic (AI clothing scan) — set in dashboard
      - key: ANTHROPIC_API_KEY
        sync: false
      # Replicate (virtual try-on) — set in dashboard
      - key: REPLICATE_API_TOKEN
        sync: false
